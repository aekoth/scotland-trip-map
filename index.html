<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Scotland · 10-Day Trip Map</title>
<link rel="preconnect" href="https://unpkg.com" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --loch:#1f5673;       /* deep loch blue */
    --loch-2:#2a7da3;
    --heather:#6b4e8f;    /* heather purple */
    --highland:#3f7a53;   /* highland green */
    --gold:#d8a13a;       /* whisky gold */
    --mist:#f4f1ea;       /* parchment / mist */
    --ink:#1c2024;
    --ink-soft:#46505a;
    --line:rgba(31,86,115,.16);
    --card:rgba(255,255,255,.86);
    --shadow:0 10px 40px -12px rgba(20,40,55,.45);
    --header-h:62px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);
    background:#e9ecef;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}

  /* ---------- Header ---------- */
  header.bar{
    position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:1200;
    display:flex;align-items:center;gap:14px;padding:0 18px;
    background:linear-gradient(180deg,rgba(28,44,55,.96),rgba(28,44,55,.88));
    backdrop-filter:blur(8px);color:#fff;
    box-shadow:0 2px 18px rgba(0,0,0,.25);
  }
  .bar .flag{font-size:22px;line-height:1}
  .bar .title{font-family:'Fraunces',serif;font-weight:600;font-size:18px;white-space:nowrap}
  .bar .title small{font-weight:400;opacity:.7;font-family:'Inter';font-size:12px;margin-left:8px}
  .bar .status{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);white-space:nowrap}
  .pill b{font-weight:600}
  #dayPill{background:var(--gold);color:#2a2410;border-color:transparent;font-weight:600}
  .daylight{opacity:.85}
  /* progress */
  #progress{position:fixed;top:var(--header-h);left:0;height:3px;width:0;
    background:linear-gradient(90deg,var(--gold),var(--heather));z-index:1200;transition:width .25s ease}

  /* ---------- Map ---------- */
  #map{position:fixed;top:var(--header-h);left:0;width:56vw;height:calc(100vh - var(--header-h));
    z-index:1;background:#a9c4d4}
  .leaflet-container{background:#acc6d6;font-family:'Inter',sans-serif}
  /* legend */
  .legend{position:absolute;left:14px;bottom:14px;z-index:600;background:var(--card);
    backdrop-filter:blur(6px);border-radius:12px;padding:10px 13px;box-shadow:var(--shadow);
    font-size:12px;color:var(--ink-soft);max-width:210px}
  .legend b{color:var(--ink);font-size:12.5px}
  .legend .row{display:flex;align-items:center;gap:8px;margin-top:6px}
  .legend .swatch{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
  .legend .sw-stop{background:var(--loch);box-shadow:0 0 0 3px rgba(31,86,115,.2)}
  .legend .sw-fav{background:var(--gold);box-shadow:0 0 0 3px rgba(216,161,58,.25)}
  .legend .sw-swap{background:#fff;border:2px dashed var(--heather)}
  .legend .sw-food{background:var(--highland);width:11px;height:11px}
  .legend .sw-line{width:18px;height:0;border-top:3px dotted var(--heather);border-radius:0;background:none}

  /* map pins */
  .pin{position:relative;width:18px;height:18px}
  .pin .dot{position:absolute;inset:0;border-radius:50%;background:var(--loch);
    border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);transition:transform .2s}
  .pin.fav .dot{background:var(--gold)}
  .pin .ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--loch);opacity:0}
  .pin.fav .ring{border-color:var(--gold)}
  .pin.active .ring{animation:pulse 1.8s ease-out infinite}
  .pin.active .dot{transform:scale(1.25)}
  @keyframes pulse{0%{transform:scale(.6);opacity:.7}100%{transform:scale(2.1);opacity:0}}
  .pin.drop{animation:drop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes drop{0%{transform:translateY(-22px);opacity:0}60%{opacity:1}100%{transform:none}}
  .pin.swap .dot{background:#fff;border:2.5px dashed var(--heather);box-shadow:0 2px 5px rgba(0,0,0,.25)}
  .pin.food{width:14px;height:14px}
  .pin.food .dot{background:var(--highland)}
  .pin .star{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:12px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}

  /* ---------- Content column ---------- */
  #content{position:relative;z-index:2;margin-left:56vw;width:44vw;padding:0;pointer-events:none}
  .step{min-height:84vh;display:flex;align-items:center;padding:7vh 5vh 7vh 3.5vh}
  .step:first-child{min-height:92vh}
  .step.tall{min-height:auto;padding-bottom:9vh}
  .card{pointer-events:auto;background:var(--card);backdrop-filter:blur(10px);
    border-radius:18px;box-shadow:var(--shadow);padding:26px 28px;width:100%;
    border:1px solid rgba(255,255,255,.6);opacity:.45;transform:translateY(24px) scale(.985);
    transition:opacity .5s ease,transform .5s ease}
  .step.active .card{opacity:1;transform:none}
  .kicker{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:.07em;color:var(--loch-2);margin-bottom:6px}
  .kicker .reg{color:var(--heather)}
  .kicker .dur{margin-left:auto;color:var(--ink-soft);font-weight:500;text-transform:none;letter-spacing:0}
  .card h2{margin:.1em 0 .35em;font-size:27px;font-weight:600;line-height:1.12}
  .card h2 .fav{color:var(--gold);font-size:.7em;vertical-align:.18em;margin-left:6px}
  .card p{margin:.55em 0;color:var(--ink-soft);font-size:15.5px}
  .card p.lead{color:var(--ink);font-size:16.5px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .tag{font-size:12px;padding:4px 10px;border-radius:999px;background:rgba(31,86,115,.08);
    color:var(--loch);font-weight:500}
  .tag.book{background:rgba(216,161,58,.16);color:#8a6310}
  .tag.drive{background:rgba(63,122,83,.12);color:var(--highland)}
  .tag.fav{background:rgba(216,161,58,.16);color:#8a6310}

  .drivebadge{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;
    color:var(--highland);background:rgba(63,122,83,.1);padding:5px 12px;border-radius:999px;margin-bottom:12px}

  /* hero / intro */
  .hero h1{font-size:46px;line-height:1.02;margin:.1em 0 .15em;font-weight:600}
  .hero .sub{font-size:17px;color:var(--ink-soft)}
  .hero .scrollcue{margin-top:22px;display:inline-flex;align-items:center;gap:9px;
    font-size:13px;font-weight:600;color:var(--loch-2);letter-spacing:.03em}
  .hero .scrollcue .arrow{display:inline-block;animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  .favs{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 4px}
  .favs .f{font-size:12.5px;background:rgba(216,161,58,.14);color:#7d590c;padding:4px 11px;border-radius:999px;font-weight:500}

  /* callout */
  .callout{margin-top:14px;border-left:4px solid var(--gold);background:rgba(216,161,58,.1);
    padding:12px 15px;border-radius:0 10px 10px 0;font-size:14px;color:#5e4a1c}
  .callout b{color:#3f3208}

  /* food picks */
  .eat{margin-top:14px;border-left:4px solid var(--highland);background:rgba(63,122,83,.08);
    padding:11px 15px 12px;border-radius:0 10px 10px 0}
  .eat h5{margin:0 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--highland);font-family:'Inter';font-weight:700}
  .eat .place{font-size:14px;color:var(--ink);margin-top:6px;line-height:1.45}
  .eat .place b{font-weight:600}
  .eat .place .meal{display:inline-block;font-size:10.5px;font-weight:700;color:#fff;
    background:var(--highland);border-radius:999px;padding:1.5px 8px;margin-right:7px;
    text-transform:uppercase;letter-spacing:.04em;vertical-align:1px}
  .eat .place .d{color:var(--ink-soft)}

  /* swap & choice options */
  .opts{display:grid;gap:12px;margin-top:18px}
  .opt{border:1px solid var(--line);border-radius:13px;padding:14px 16px;background:rgba(255,255,255,.55);
    transition:transform .15s,box-shadow .15s,border-color .15s;cursor:default}
  .opt:hover{transform:translateY(-2px);box-shadow:0 8px 22px -12px rgba(20,40,55,.4);border-color:var(--heather)}
  .opt h4{margin:0 0 3px;font-size:16px;font-weight:600;font-family:'Inter'}
  .opt h4 .n{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--heather);
    color:#fff;font-size:12px;text-align:center;line-height:22px;margin-right:8px;vertical-align:1px}
  .opt p{margin:.25em 0 0;font-size:14px;color:var(--ink-soft)}
  .opt .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .opt[data-coords]{cursor:pointer}
  .opt[data-coords]::after{content:"📍 hover to locate";font-size:11px;color:var(--heather);opacity:.7;display:block;margin-top:8px}

  /* checklist */
  .checkwrap h2,.packwrap h2{margin-top:0}
  .grp{margin-top:18px}
  .grp h3{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--loch-2);
    margin:0 0 4px;font-family:'Inter';font-weight:700}
  .grp .note{font-size:12.5px;color:var(--ink-soft);margin:0 0 8px}
  ul.check{list-style:none;margin:0;padding:0}
  ul.check li{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid var(--line)}
  ul.check li:last-child{border-bottom:none}
  ul.check input{appearance:none;width:20px;height:20px;flex:0 0 auto;margin-top:1px;border:2px solid var(--loch-2);
    border-radius:6px;cursor:pointer;position:relative;transition:.15s;background:#fff}
  ul.check input:checked{background:var(--highland);border-color:var(--highland)}
  ul.check input:checked::after{content:"✓";color:#fff;position:absolute;inset:0;text-align:center;
    line-height:18px;font-size:13px;font-weight:700}
  ul.check label{font-size:14.5px;cursor:pointer;color:var(--ink)}
  ul.check li.done label{text-decoration:line-through;color:#9aa3ab}
  ul.check label b{color:var(--loch)}
  .resetbtn{margin-top:14px;font-size:12.5px;color:var(--ink-soft);background:none;border:1px solid var(--line);
    padding:6px 12px;border-radius:8px;cursor:pointer}
  .resetbtn:hover{border-color:var(--heather);color:var(--heather)}
  .progress-mini{font-size:12.5px;color:var(--ink-soft);margin-top:6px}

  .footer{padding:5vh 5vh 12vh 3.5vh;color:var(--ink-soft);font-size:13px}
  .footer .card{opacity:1;transform:none}

  /* ---------- Day nav ---------- */
  #daynav{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:1100;
    display:flex;flex-direction:column;gap:2px;align-items:flex-end}
  #daynav a{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink-soft);
    font-size:11.5px;font-weight:600;padding:2px 0;opacity:.55;transition:.18s;cursor:pointer}
  #daynav a .lbl{background:var(--card);padding:2px 8px;border-radius:6px;box-shadow:var(--shadow);
    transform:translateX(6px);opacity:0;transition:.18s;white-space:nowrap;pointer-events:none}
  #daynav a .tick{width:18px;height:3px;border-radius:3px;background:var(--ink-soft);opacity:.4}
  #daynav a:hover .lbl,#daynav a.on .lbl{opacity:1;transform:none}
  #daynav a:hover{opacity:1}
  #daynav a.on{opacity:1;color:var(--heather)}
  #daynav a.on .tick{width:26px;background:var(--heather);opacity:1}

  /* ---------- responsive ---------- */
  @media (max-width:880px){
    :root{--header-h:54px}
    /* Map: fixed top half of the screen, layered above the scrolling cards
       so they slide behind it as they pass the midline. */
    #map{width:100%;height:calc(50vh - var(--header-h));z-index:1000}
    #content{margin-left:0;width:100%;padding-top:50vh}
    /* Each step is one bottom-half screen so one card sits centred at a time. */
    .step{min-height:50vh;padding:16px 16px;align-items:center}
    .step:first-child{min-height:50vh;padding-top:16px}
    .step.tall{min-height:auto;align-items:flex-start;padding-top:16px;padding-bottom:24px}
    .card{opacity:1;transform:none}              /* always readable on mobile */
    .step.active .card{box-shadow:0 12px 30px -10px rgba(20,40,55,.55)}
    .hero h1{font-size:32px}
    .bar .title small{display:none}
    .daylight{display:none}
    #daynav{display:none}
    .legend{max-width:150px;font-size:11px;left:8px;bottom:8px;padding:7px 9px}
  }
</style>
</head>
<body>

<header class="bar">
  <span class="flag">🏴󠁧󠁢󠁳󠁣󠁴󠁿</span>
  <span class="title">Scotland <small>10 days · Inverness → Edinburgh</small></span>
  <div class="status">
    <span class="pill daylight" title="Late October daylight">🌅 ~07:40 · 🌇 ~16:40</span>
    <span class="pill" id="regionPill"><b id="regionTxt">The Highlands</b></span>
    <span class="pill" id="dayPill">Welcome</span>
  </div>
</header>
<div id="progress"></div>

<div id="map"></div>
<nav id="daynav"></nav>
<main id="content"></main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* ============================================================
   TRIP DATA
   ============================================================ */
const COL = {loch:'#1f5673', gold:'#d8a13a', heather:'#6b4e8f'};

// region keys: north / drive / south
const STEPS = [
  {type:'intro', region:'north', regionTxt:'The Highlands', day:'Welcome'},

  // ---------- NORTH ----------
  {type:'stop', route:true, region:'north', regionTxt:'Inverness · North', day:'Day 1',
   title:'Arrive &amp; settle in Inverness', dur:'Evening', coords:[57.4778,-4.2247], zoom:12,
   kick:'Arrival', drive:'✈️ Land at Inverness · pick up the rental car',
   body:`<p class="lead">Land in Inverness and collect the hire car. Give yourself a slow evening — no rush.</p>`,
   food:[
     {meal:'Dinner',name:'The Mustard Seed',coords:[57.4809,-4.2288],d:'riverside modern-Scottish in a converted church — an Inverness favourite; book a window table.'},
     {meal:'Casual',name:'Hootananny',coords:[57.4794,-4.2268],d:'pub grub downstairs, live Highland folk music most nights — the fun option if you land with energy.'},
   ],
   tags:['Car pickup','Easy dinner in town']},

  {type:'stop', route:true, region:'north', regionTxt:'Inverness · North', day:'Day 1',
   title:'Stroll the Ness Islands', dur:'~1 hr', coords:[57.4655,-4.2300], zoom:13,
   kick:'Day 1 · Evening',
   body:`<p>Little footbridges hop between wooded islands in the River Ness — a gentle leg-stretch right in town after a travel day.</p>`,
   tags:['Free','Gentle walk','Riverside']},

  {type:'stop', route:true, region:'north', regionTxt:'Loch Ness · North', day:'Day 2', fav:true,
   title:'Urquhart Castle &amp; Loch Ness', dur:'~1 hr', coords:[57.3242,-4.4426], zoom:11,
   kick:'Day 2 · Loch Ness', drive:'🚗 ~30 min each way down the loch',
   body:`<p class="lead">The classic Highland view. Urquhart Castle is a dramatic ruin right on the water — the lochside setting is the real draw, so paying in is optional.</p>`,
   food:[
     {meal:'Lunch',name:"Fiddler's Highland Restaurant",coords:[57.3355,-4.4790],d:'in Drumnadrochit, 5 min from the castle — hearty Highland plates and a legendary whisky wall.'},
   ],
   tags:['Loch Ness','Castle ruin','Photo stop']},

  {type:'stop', route:true, region:'north', regionTxt:'Loch Ness · North', day:'Day 2', fav:true,
   title:'Loch Ness boat cruise', dur:'~1 hr', coords:[57.3330,-4.4660], zoom:12,
   kick:'Day 2 · Loch Ness',
   body:`<p>The best way to actually be <i>on</i> the loch — keep an eye out for Nessie. Book ahead in autumn as sailings thin out.</p>`,
   food:[
     {meal:'Dinner',name:'Rocpool',coords:[57.4778,-4.2287],d:'back in Inverness — the city\'s Michelin-starred brasserie on the River Ness. Book well ahead; the early-evening menu is great value.'},
   ],
   tags:['Optional booking','On the water']},

  {type:'stop', route:true, region:'north', regionTxt:'Cairngorms · North', day:'Day 3', fav:true,
   title:'Horse trek in the Cairngorms', dur:'1–2 hrs in the saddle', coords:[57.1917,-3.8253], zoom:11,
   kick:'Day 3 · Aviemore', drive:'🚗 ~45 min each way to Aviemore',
   body:`<p class="lead">Aviemore is the heart of Highland pony trekking. Ride through ancient pine forest and heather with mountain views, then spend the rest of the day on easy forest walks or the funicular.</p>`,
   food:[
     {meal:'Lunch',name:'The Old Bridge Inn',coords:[57.1876,-3.8214],d:'riverside gastropub in an old gamekeeper\'s cottage by the Spey — log fire, great after the saddle. Lunch served 12–2:15.'},
     {meal:'Dinner',name:'Black Isle Bar',coords:[57.4793,-4.2271],d:'back in Inverness — wood-fired pizza and the brewery\'s own organic ales. Casual and buzzy.'},
   ],
   tags:['Book ahead','Pick route length','Cairngorms']},

  {type:'stop', route:true, region:'north', regionTxt:'Inverness · North', day:'Day 4',
   title:'Culloden Battlefield', dur:'~1.5–2 hrs', coords:[57.4775,-4.0936], zoom:12,
   kick:'Day 4 · Highlands flex',
   body:`<p class="lead">The 1746 battlefield — quiet and moving, and a big one for <i>Outlander</i> fans. The visitor centre tells the story well.</p>`,
   tags:['History','Outlander']},

  {type:'stop', route:true, region:'north', regionTxt:'Inverness · North', day:'Day 4',
   title:'Clava Cairns', dur:'~30 min', coords:[57.4736,-4.0747], zoom:14,
   kick:'Day 4 · Highlands flex',
   body:`<p>4,000-year-old standing stones and burial cairns, right next door to Culloden. Atmospheric and free.</p>`,
   food:[
     {meal:'Lunch',name:'Culloden visitor centre café',d:'simple soups and sandwiches right at the battlefield — easiest option between the two sites.'},
     {meal:'Dinner',name:'River House',coords:[57.4794,-4.2308],d:'tiny riverside seafood spot in Inverness — exceptional, and it books out. Reserve for your last Highland night.'},
   ],
   tags:['Free','Standing stones']},

  // ---- North swaps ----
  {type:'swaps', region:'north', regionTxt:'Inverness · North', day:'Swap options',
   title:'Highlands — swap options', kick:'Inverness region',
   intro:`Anything here can replace a Day 1–4 plan. Hover a card with a pin to locate it.`,
   options:[
     {n:1,name:'Just rest / early dinner',info:'Skip the Ness Islands stroll and simply rest, or head straight out for an early dinner if you land with energy.'},
     {n:2,name:'Fort Augustus locks',coords:[57.1437,-4.6806],info:'Drive to the south end of Loch Ness and watch boats climb the canal lock staircase.'},
     {n:2,name:'Lochside walk',info:'Skip the cruise and take a quiet walk along the shore instead.'},
     {n:3,name:'Rothiemurchus Estate',coords:[57.1650,-3.8000],info:'Add estate activities near Aviemore — trails, lochs, wildlife.'},
     {n:3,name:'Cairngorm funicular',coords:[57.1331,-3.6688],book:true,info:'Big mountain views without the climb. Pre-book.'},
     {n:4,name:'Glen Affric',coords:[57.2730,-4.9650],info:'A half-day in what many call Scotland\'s prettiest glen.'},
     {n:4,name:'Chanonry Point',coords:[57.5742,-4.0905],info:'Wild dolphin-watching from the shore — one of the UK\'s best spots.'},
     {n:4,name:'Isle of Skye',coords:[57.4125,-6.1953],info:'Ambitious long day (~2.5 hrs each way) — only if you\'re up for a big drive.'},
   ]},

  // ---------- DRIVE DAY ----------
  {type:'stop', route:true, region:'drive', regionTxt:'The Drive South', day:'Day 5',
   title:'South to Pitlochry', dur:'Morning drive', coords:[56.7028,-3.7290], zoom:11,
   kick:'Day 5 · Drive day', drive:'🚗 ~1 hr 45 min from Inverness',
   body:`<p class="lead">Leave Inverness in the morning and roll into pretty Pitlochry — your gateway to the middle of the country.</p>`,
   food:[
     {meal:'Lunch',name:'Moulin Inn',coords:[56.7176,-3.7255],d:'a 1695 coaching inn in Moulin village, minutes from Edradour — stone walls, open fire, own-brewed ale.'},
     {meal:'Tea & cake',name:"Hettie's Tearoom",coords:[56.7040,-3.7330],d:'Pitlochry\'s beloved tearoom — 30+ tea blends and serious home baking, if you\'d rather cake than a pub.'},
   ],
   tags:['Full driving day','~3.5 hrs total']},

  {type:'stop', route:true, region:'drive', regionTxt:'The Drive South', day:'Day 5', fav:true,
   title:'Whisky tour — Edradour / Blair Athol', dur:'~1–1.5 hrs', coords:[56.6986,-3.7375], zoom:13,
   kick:'Day 5 · Drive day',
   body:`<p>Your one alcohol tour, right on the route. Edradour is tiny and charming; Blair Athol is a short hop away. Designated driver, mind!</p>`,
   tags:['Book ahead','Tasting']},

// build ordered route nodes
const routeNodes = STEPS.filter(s=>s.route);

const markers = [];   // main markers by routeIndex
const legs = [];      // polylines by routeIndex (leg ending at node i)
let maxDrawn = -1;
const swapLayer = L.layerGroup().addTo(map);
const foodLayer = L.layerGroup().addTo(map);

function makePin(opts){
  const cls = 'pin'+(opts.fav?' fav':'')+(opts.swap?' swap':'')+(opts.food?' food':'')+' drop';
  const star = opts.fav?'<span class="star">★</span>':'';
  const sz = opts.food?14:18;
  return L.divIcon({className:'',html:`<div class="${cls}">${star}<span class="ring"></span><span class="dot"></span></div>`,
    iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]});
}

function showFoodMarkers(food){
  foodLayer.clearLayers();
  (food||[]).forEach(f=>{
    if(!f.coords) return;
    L.marker(f.coords,{icon:makePin({food:true})})
      .bindTooltip('🍴 '+f.name,{direction:'top',offset:[0,-9]})
      .addTo(foodLayer);
  });
}

function ensureMarker(i){
  if(markers[i]) return markers[i];
  const node = routeNodes[i];
  const m = L.marker(node.coords,{icon:makePin({fav:node.fav}), riseOnHover:true})
    .bindTooltip(node.title.replace(/&amp;/g,'&'),{direction:'top',offset:[0,-12]});
  m.addTo(map);
  markers[i]=m;
  return m;
}

function drawLeg(i, animate){
  if(i<=0 || legs[i]) return;
  const a = routeNodes[i-1].coords, b = routeNodes[i].coords;
  const line = L.polyline([a], {color:COL.heather, weight:3, opacity:.85,
    dashArray:'1 7', lineCap:'round'}).addTo(map);
  legs[i]=line;
  if(!animate){ line.setLatLngs([a,b]); return; }
  const t0 = performance.now(), dur=650;
  (function frame(now){
    const t = Math.min(1,(now-t0)/dur);
    const lat = a[0]+(b[0]-a[0])*t, lng = a[1]+(b[1]-a[1])*t;
    line.setLatLngs([a,[lat,lng]]);
    if(t<1) requestAnimationFrame(frame);
  })(t0);
}

function setActiveMarker(idx){
  markers.forEach((m,i)=>{ if(!m) return;
    const el=m.getElement(); if(el){ const p=el.querySelector('.pin'); if(p) p.classList.toggle('active', i===idx);} });
}

function routeUpTo(idx){
  for(let i=0;i<=idx;i++){
    ensureMarker(i);
    drawLeg(i, i>maxDrawn);
  }
  if(idx>maxDrawn) maxDrawn=idx;
}

function clearSwaps(){ swapLayer.clearLayers(); }

function showOptionMarkers(options){
  clearSwaps();
  const pts=[];
  options.forEach(o=>{
    if(!o.coords) return;
    const m=L.marker(o.coords,{icon:makePin({swap:true})})
      .bindTooltip(o.name,{direction:'top',offset:[0,-10]});
    swapLayer.addLayer(m); pts.push(o.coords); o._marker=m;
  });
  return pts;
}

function checkLi(scope,gi,ii,text){
  const key=`scot-${scope}-${gi}-${ii}`;
  return `<li><input type="checkbox" id="${key}" data-key="${key}"><label for="${key}">${text}</label></li>`;
}

/* ---- checkbox persistence ---- */
function initChecks(){
  document.querySelectorAll('ul.check input').forEach(cb=>{
    const k=cb.dataset.key;
    if(localStorage.getItem(k)==='1'){ cb.checked=true; cb.closest('li').classList.add('done'); }
    cb.addEventListener('change',()=>{
      localStorage.setItem(k, cb.checked?'1':'0');
      cb.closest('li').classList.toggle('done', cb.checked);
      updateProg();
    });
  });
  document.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.onclick=()=>{
      const sc=btn.dataset.reset;
      document.querySelectorAll(`ul.check input[data-key^="scot-${sc}-"]`).forEach(cb=>{
        cb.checked=false; localStorage.setItem(cb.dataset.key,'0'); cb.closest('li').classList.remove('done');
      });
      updateProg();
    };
  });
  updateProg();
}
function progFor(scope,elId){
  const all=document.querySelectorAll(`ul.check input[data-key^="scot-${scope}-"]`);
  const done=[...all].filter(c=>c.checked).length;
  const e=document.getElementById(elId);
  if(e) e.textContent = `${done} of ${all.length} done`;
}
function updateProg(){ progFor('book','bookProg'); progFor('pack','packProg'); }
initChecks();

  headerDay.textContent = s.day || '';
  regionTxt.textContent = s.regionTxt || REGION_NAMES[s.region] || '';

  // nav highlight: find last nav item with idx<=current
  let active=null;
  navItems.forEach(n=>{ if(n.idx<=idx) active=n; });
  navItems.forEach(n=>n.a.classList.toggle('on', n===active));

  // progress
  progressBar.style.width = (idx/(STEPS.length-1)*100)+'%';

  // map behaviour
  if(s.type==='stop'){
    clearSwaps();
    showFoodMarkers(s.food);
    routeUpTo(s.routeIndex);
    setActiveMarker(s.routeIndex);
    map.flyTo(s.coords, s.zoom||13, {duration:1.3});
  } else if(s.type==='swaps'||s.type==='choice'){
    setActiveMarker(-1);
    showFoodMarkers(null);
    const pts=showOptionMarkers(s.options);
    if(pts.length){
      const b=L.latLngBounds(pts);
      // include the region's last visited stop for context
      map.flyToBounds(b.pad(0.35),{duration:1.3, maxZoom:11});
    }
  } else if(s.type==='intro'){
    clearSwaps(); setActiveMarker(-1); showFoodMarkers(null);
    map.flyToBounds(SCOT_BOUNDS,{duration:1.3});
  } else { // booking / packing
    clearSwaps(); setActiveMarker(-1); showFoodMarkers(null);
    map.flyToBounds(SCOT_BOUNDS,{duration:1.3});
  }
}

// Active-step detection. The "active line" is where the focused card sits:
// the vertical centre on desktop, and ~72% down on mobile (centre of the
// bottom-half scroll area, since the map occupies the fixed top half).
const mqMobile = window.matchMedia('(max-width:880px)');
const steps = [...document.querySelectorAll('.step')];
function activeLineY(){ return window.innerHeight * (mqMobile.matches ? 0.72 : 0.5); }
let _scrollRAF=null;
function pickActive(){
  _scrollRAF=null;
  const line = activeLineY();
  let bestIdx=0, bestDist=Infinity;
  for(const s of steps){
    const r=s.getBoundingClientRect();
    const d = line < r.top ? r.top - line : (line > r.bottom ? line - r.bottom : 0);
    if(d < bestDist){ bestDist=d; bestIdx=+s.dataset.idx; }
  }
  activate(bestIdx);
}
function onScroll(){ if(_scrollRAF==null) _scrollRAF=requestAnimationFrame(pickActive); }
window.addEventListener('scroll', onScroll, {passive:true});

// initial activation + keep the map sized to its container
activate(0);
pickActive();
window.addEventListener('load',()=>setTimeout(()=>{map.invalidateSize();pickActive();},200));
let _rt; window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{map.invalidateSize();pickActive();},200); });
</script>
</body>
